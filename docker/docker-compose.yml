version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: doktorgo-postgres
    environment:
      POSTGRES_USER: doktorgo
      POSTGRES_PASSWORD: doktorgo
      POSTGRES_DB: doktorgo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doktorgo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: doktorgo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: doktorgo-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: doktorgo
      MONGO_INITDB_ROOT_PASSWORD: doktorgo
      MONGO_INITDB_DATABASE: doktorgo
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: doktorgo-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@doktorgo.test
      PGADMIN_DEFAULT_PASSWORD: doktorgo
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  mongo-express:
    image: mongo-express
    container_name: doktorgo-mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: doktorgo
      ME_CONFIG_MONGODB_ADMINPASSWORD: doktorgo
      ME_CONFIG_MONGODB_URL: mongodb://doktorgo:doktorgo@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog
    container_name: doktorgo-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MH_ENV_DOMAINS: doktorgo.local

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: doktorgo-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: doktorgo
      DB_PASSWORD: doktorgo
      DB_NAME: doktorgo
      JWT_SECRET: doktorgo-dev-secret-key
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: doktorgo
      MONGO_PASSWORD: doktorgo
      MONGO_DATABASE: doktorgo
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    command: node dist/main.js

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: doktorgo-frontend
    environment:
      NODE_ENV: production
      API_URL: http://backend:3000/api/v1
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: doktorgo-dev-secret-key
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  pgadmin_data: