version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: doktorgo-postgres
    environment:
      POSTGRES_USER: doktorgo
      POSTGRES_PASSWORD: doktorgo
      POSTGRES_DB: doktorgo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doktorgo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: doktorgo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: doktorgo-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: doktorgo
      MONGO_INITDB_ROOT_PASSWORD: doktorgo
      MONGO_INITDB_DATABASE: doktorgo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries:5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: doktorgo-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: doktorgo
      DB_PASSWORD: doktorgo
      DB_NAME: doktorgo
      JWT_SECRET: doktorgo-dev-secret-key
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: doktorgo
      MONGO_PASSWORD: doktorgo
      MONGO_DATABASE: doktorgo
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    command: node dist/main.js

volumes:
  postgres_data:
  redis_data:
  mongodb_data: